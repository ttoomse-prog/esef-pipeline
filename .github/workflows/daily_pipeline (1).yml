name: Daily ESEF Pipeline

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max new filings to process"
        required: false
        default: "5"
      dry_run:
        description: "Dry run (no downloads or Drive uploads)"
        required: false
        default: "false"
      watchlist_only:
        description: "Only process watchlist companies"
        required: false
        default: "false"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID:     ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_FOLDER_ID:     ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '5' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          WATCHLIST_ONLY="${{ github.event.inputs.watchlist_only || 'false' }}"

          ARGS="--limit $LIMIT"
          [ "$DRY_RUN" = "true" ]        && ARGS="$ARGS --dry-run"
          [ "$WATCHLIST_ONLY" = "true" ] && ARGS="$ARGS --watchlist-only"

          python pipeline.py $ARGS

      - name: Commit updated pipeline state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit if pipeline_state.json actually exists (skipped in dry-run)
          if [ -f pipeline_state.json ]; then
            git add pipeline_state.json
            git diff --staged --quiet || git commit -m "chore: update pipeline state [skip ci]"
            git push
          else
            echo "pipeline_state.json not found (dry-run mode) — nothing to commit"
          fi
